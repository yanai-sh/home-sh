<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>yanai.sh</title>
  <desc>yanai.sh wordmark on a dark background with a subtle blue glow.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="54%" r="55%">
      <stop offset="0%" stop-color="#2F6BFF" stop-opacity="0.22" />
      <stop offset="58%" stop-color="#2F6BFF" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#2F6BFF" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#2F6BFF" opacity="0.16" />
      <circle cx="12" cy="12" r="1" fill="#2F6BFF" opacity="0.12" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0A0A0A" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="250" y="90" width="700" height="450" fill="url(#grid)" opacity="0.8" />
  <text
    x="50%"
    y="52%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="'IBM Plex Mono', ui-monospace, monospace"
    font-size="122"
    font-weight="800"
    letter-spacing="0"
  ><tspan fill="#F5F7FA">yanai</tspan><tspan fill="#2F6BFF">.sh</tspan></text>
</svg>
