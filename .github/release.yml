# Configures GitHub's built-in auto-generated release notes
# (https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes).
# Each PR merged between two tags lands under a category based on its labels;
# unlabelled PRs fall through to "Other changes".

changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot[bot]
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Infrastructure
      labels:
        - ci
        - infra
        - chore
    - title: Documentation
      labels:
        - docs
    - title: Other changes
      labels:
        - "*"
