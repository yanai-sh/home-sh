# One-off cleanup: delete orphaned home-sh-telemetry (D1) and home-sh-sessions (KV).
# Safe when those bindings were removed from OpenTofu and the SvelteKit Worker.
name: yanai-sh / Ops — destroy legacy data

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List targets only; do not delete"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  destroy:
    name: yanai-sh / ops — destroy legacy data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/nub-install

      - name: Destroy legacy D1 + KV (if present)
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          nub exec tsx scripts/destroy-legacy-data-stores.ts "${ARGS[@]}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
