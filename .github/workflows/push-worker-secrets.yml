# workflow_dispatch: sync Workers Secrets Store from GitHub Environment secrets.
name: yanai-sh / Secrets — push

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub Environment (source of secrets)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  push:
    name: yanai-sh / secrets — sync to store
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/nub-install

      - name: Push secrets to Secrets Store
        run: nub exec tsx scripts/push-secrets.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PUSH_SECRETS_FROM_ENV: "1"
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_FROM: ${{ secrets.CONTACT_FROM }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
          RESUME_REPO_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}
