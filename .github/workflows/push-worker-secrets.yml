# workflow_dispatch: sync Workers Secrets Store from repository secrets.
name: Push Worker secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push to Secrets Store
        run: bun run scripts/push-secrets.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUSH_SECRETS_FROM_ENV: "1"
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_FROM: ${{ secrets.CONTACT_FROM }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
          RESUME_REPO_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}
