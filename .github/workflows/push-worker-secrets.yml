# workflow_dispatch: sync Workers Secrets Store from GitHub Environment secrets.
name: yanai-sh / Secrets — push

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub Environment (source of secrets)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  push:
    name: yanai-sh / secrets — sync to store
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies (Bun)
        run: bun install --frozen-lockfile

      - name: Push secrets to Secrets Store
        run: bun run scripts/push-secrets.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PUSH_SECRETS_FROM_ENV: "1"
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_FROM: ${{ secrets.CONTACT_FROM }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
          RESUME_REPO_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}
