# OpenTofu plan for infra/tofu (drift + PR visibility). Does not apply.
#
# Credentials: GitHub Actions encrypted secrets (same pattern as deploy tools):
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
# No secrets file on the runner — OpenTofu uses TF_VAR_* from GitHub encrypted secrets.
# Worker runtime secrets: infra/secrets/ + push-worker-secrets workflow (see infra/README.md).
name: Infra plan

on:
  pull_request:
    paths:
      - "infra/tofu/**"
      - "infra/ACCESS_WORKERS.md"
      - "infra/README.md"
      - "infra/secrets/**"
      - ".github/workflows/infra-plan.yml"
  push:
    branches: [main, dev]
    paths:
      - "infra/tofu/**"
      - "infra/ACCESS_WORKERS.md"
      - "infra/README.md"
      - "infra/secrets/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  contents: read

concurrency:
  group: infra-plan-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tofu-plan:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.10.5

      - name: OpenTofu init + plan
        working-directory: infra/tofu
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TF_VAR_cloudflare_api_token}" ] || [ -z "${TF_VAR_cloudflare_account_id}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID unset — skipping tofu plan (set both on the GitHub Environment used by this job)."
            exit 0
          fi
          tofu init -input=false
          tofu plan -input=false -no-color
