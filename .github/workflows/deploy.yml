# Production only: runs after merges land on `main`.
# Keep install/check/build here so each deploy uploads a fresh artifact.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
        env:
          # Embedded into the SSR'd HTML at build time so the contact form's
          # Turnstile widget renders. Public value (widget id), not a secret.
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}

      # Pages reserves ASSETS; @astrojs/cloudflare can emit it in dist wrangler.json (withastro/astro#16107).
      - name: Strip reserved ASSETS binding from build output
        run: |
          set -euo pipefail
          mapfile -d '' -t jsons < <(find apps/site/dist -name wrangler.json -type f -print0)
          if ((${#jsons[@]} == 0)); then
            echo "error: no wrangler.json under apps/site/dist" >&2
            find apps/site/dist -type f | head -20 || true
            exit 1
          fi
          for f in "${jsons[@]}"; do
            jq 'del(.assets.binding)' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/site/dist --project-name=yanai-sh
