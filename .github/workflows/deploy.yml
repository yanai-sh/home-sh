# Production only: runs after merges land on `main`.
# Two-step versioned deploy:
#   1) `wrangler versions upload` — uploads code + bindings as an immutable
#      version (0% traffic, addressable at a unique preview URL).
#   2) `wrangler versions deploy <id>@100%` — promotes the version to take
#      all production traffic at the Custom Domain (yanai.sh).
# Decoupling the two enables instant rollback (.github/workflows/rollback.yml)
# without rebuilding — earlier versions stay accessible until Cloudflare's
# 10-version retention rolls them off.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workers-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
        env:
          # Embedded into the SSR'd HTML at build time so the contact form's
          # Turnstile widget renders. Public value (widget id), not a secret.
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Upload Worker version
        id: upload
        # Project-pinned wrangler 4.x via the `version-upload` script in
        # apps/site/package.json. Extra args after `--` are forwarded to wrangler.
        # `--message` annotates each version with the commit subject so the
        # Cloudflare dashboard's version history is human-readable.
        # `--tag` records the short SHA for traceability when rolling back.
        run: |
          set -euo pipefail
          OUTPUT="$(bun run --cwd apps/site version-upload -- \
            --message "$(git log --format='%s' -1)" \
            --tag "${GITHUB_SHA:0:7}")"
          echo "$OUTPUT"
          # Wrangler prints "Worker Version ID: <uuid>" on success.
          VERSION_ID="$(printf '%s\n' "$OUTPUT" | grep -oE 'Worker Version ID: [a-f0-9-]+' | awk '{print $4}')"
          if [ -z "$VERSION_ID" ]; then
            echo "::error::Failed to parse Worker Version ID from wrangler output" >&2
            exit 1
          fi
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Promote version to 100% production traffic
        run: |
          set -euo pipefail
          bun run --cwd apps/site version-deploy -- \
            "${{ steps.upload.outputs.version_id }}@100%" \
            --message "auto-promote ${GITHUB_SHA:0:7} from $(git log --format='%s' -1 | head -c 60)" \
            --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
