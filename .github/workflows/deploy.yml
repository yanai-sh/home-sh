# Two-stage versioned deploy:
#
#   Push to `dev` → uploads an immutable Worker version to the staging
#   Worker (yanai-sh-staging, set via `--name` override at upload time
#   against the shared apps/site/wrangler.jsonc). Production at yanai.sh
#   is unaffected. Wrangler `--tag` uses **`dev-<run_id>`** (no git tag on dev).
#
#   Push to `main` → uploads + promotes to 100% on the production Worker
#   (yanai-sh, bound to yanai.sh via Custom Domain). Git tag + GitHub Release
#   use **SemVer** on the **0.y.z pre-1.0** line: next tag after any legacy **`v1+.*`**
#   release (e.g. **`v2.7.0`**) is **`v0.1.0`** (intentional hard reset). Then
#   **patch** bumps the patch digit; **workflow_dispatch** **minor** / **major**
#   bump **0.minor** or promote to **`v1.0.0`**.
#
# Each Worker has its own ~10-version retention, so dev pushes never
# displace prod rollback options. Rollback (.github/workflows/rollback.yml)
# remains a separate workflow that promotes any prior immutable production
# version to 100% without rebuilding.

name: yanai-sh / Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: "Skip smoke after upload (set true for hotfix paths)"
        required: false
        default: "false"
        type: string
      version_bump:
        description: "SemVer bump (main only; pushes = patch on 0.y.z)"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: yanai-sh-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: yanai-sh / deploy — publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    outputs:
      staging_preview_url: ${{ steps.upload.outputs.preview_url }}
      version_id: ${{ steps.upload.outputs.version_id }}
      next_tag: ${{ steps.tag.outputs.next }}
      previous_tag: ${{ steps.tag.outputs.previous }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ secrets.RESUME_REPO_TOKEN }}

      - uses: ./.github/actions/pnpm-build
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Assert run_worker_first in built wrangler.json
        run: |
          set -euo pipefail
          WRANGLER_JSON="apps/site/dist/yanai_sh/wrangler.json"
          if ! grep -q '"run_worker_first"[[:space:]]*:[[:space:]]*true' "$WRANGLER_JSON"; then
            echo "::error::Missing assets.run_worker_first in $WRANGLER_JSON — Hono SSR would lose to stale static index.html." >&2
            exit 1
          fi

      - name: Compute next version tag
        id: tag
        env:
          VERSION_BUMP: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.version_bump || 'patch' }}
        run: |
          set -euo pipefail
          LAST0="$(git tag -l | grep -E '^v0\.[0-9]+\.[0-9]+$' | sort -Vr | head -1 || true)"
          LEGACY="$(git tag -l | grep -E '^v[1-9][0-9]*\.[0-9]+\.[0-9]+$' | sort -Vr | head -1 || true)"
          if [ -n "$LAST0" ]; then
            LAST="$LAST0"
          elif [ -n "$LEGACY" ]; then
            LAST="$LEGACY"
          else
            LAST=""
          fi

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            NEXT="dev-${GITHUB_RUN_ID}"
            PREV="${LAST:-<none>}"
            echo "previous=$PREV" >> "$GITHUB_OUTPUT"
            echo "next=$NEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$LAST0" ]; then
            VERSION="${LAST0#v}"
            IFS='.' read -r _Z MINOR PATCH <<< "$VERSION"
            case "${VERSION_BUMP}" in
              major) NEXT="v1.0.0" ;;
              minor) NEXT="v0.$((MINOR + 1)).0" ;;
              *) NEXT="v0.${MINOR}.$((PATCH + 1))" ;;
            esac
          elif [ -n "$LEGACY" ]; then
            NEXT="v0.1.0"
          else
            NEXT="v0.1.0"
          fi

          PREV="${LAST:-<none>}"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Upload Worker version (wrangler)
        id: upload
        run: |
          set -euo pipefail
          NAME_FLAGS=()
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            NAME_FLAGS=(--name yanai-sh-staging)
          fi
          OUTPUT="$(pnpm --dir apps/site version-upload -- \
            "${NAME_FLAGS[@]}" \
            --message "$(git log --format='%s' -1)" \
            --tag "${{ steps.tag.outputs.next }}")"
          echo "$OUTPUT"
          VERSION_ID="$(printf '%s\n' "$OUTPUT" | grep -oE 'Worker Version ID: [a-f0-9-]+' | awk '{print $4}')"
          if [ -z "$VERSION_ID" ]; then
            echo "::error::Failed to parse Worker Version ID from wrangler output" >&2
            exit 1
          fi
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          PREVIEW_URL="$(printf '%s\n' "$OUTPUT" | grep -oP 'Version Preview URL:\s*\Khttps://\S+' | head -1 || true)"
          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL="$(printf '%s\n' "$OUTPUT" | grep -oP 'Version Preview Alias URL:\s*\Khttps://\S+' | head -1 || true)"
          fi
          echo "preview_url=${PREVIEW_URL:-}" >> "$GITHUB_OUTPUT"

      - name: Promote version to production (100%)
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          pnpm --dir apps/site version-deploy -- \
            "${{ steps.upload.outputs.version_id }}@100%" \
            --message "auto-promote ${GITHUB_SHA:0:7} from $(git log --format='%s' -1 | head -c 60)" \
            --yes

      - name: Assert production serves Hono splash
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --http1.1 -4 https://yanai.sh/ || true)"
            if printf '%s' "$BODY" | grep -q 'id="shell"'; then
              echo "Production serves Hono splash (#shell found on attempt ${attempt})."
              if printf '%s' "$BODY" | grep -qE 'Layout\.astro|/_astro/'; then
                echo "::warning::Legacy Astro markers still present alongside Hono shell." >&2
              fi
              exit 0
            fi
            if printf '%s' "$BODY" | grep -qE 'Layout\.astro|/_astro/'; then
              echo "::warning::Production still looks like legacy Astro (attempt ${attempt}/6)" >&2
            else
              echo "Attempt ${attempt}/6: #shell not found yet." >&2
            fi
            sleep 10
          done
          echo "::error::https://yanai.sh does not serve Hono splash after promote (version ${{ steps.upload.outputs.version_id }})." >&2
          exit 1

      - name: Write deploy summary
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            {
              echo "### Production deploy"
              echo ""
              echo "Tagged \`${{ steps.tag.outputs.next }}\` (previous: \`${{ steps.tag.outputs.previous }}\`)."
              echo ""
              echo "Promoted version \`${{ steps.upload.outputs.version_id }}\` to 100% at https://yanai.sh"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Staging deploy (yanai-sh-staging)"
              echo ""
              echo "Worker version label \`${{ steps.tag.outputs.next }}\` (no git tag on **\`dev\`**)."
              echo ""
              echo "Latest release tag for reference: \`${{ steps.tag.outputs.previous }}\`."
              echo ""
              echo "Uploaded version \`${{ steps.upload.outputs.version_id }}\` to the **yanai-sh-staging** Worker. Production at https://yanai.sh is unchanged."
              echo ""
              if [ -n "${{ steps.upload.outputs.preview_url }}" ]; then
                echo "**Version preview URL**: ${{ steps.upload.outputs.preview_url }}"
              else
                echo "Wrangler did not print a **Version Preview URL**. Open **Upload Worker version** logs or Cloudflare → **yanai-sh-staging** → **Deployments**."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment staging preview on PRs
        if: github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PREVIEW_URL="${{ steps.upload.outputs.preview_url }}"
          if [ -z "$PREVIEW_URL" ]; then
            exit 0
          fi
          BODY="$(printf '%s\n' \
            '**Staging Worker preview** (**yanai-sh-staging**, immutable version):' \
            '' \
            "${PREVIEW_URL}" \
            '' \
            'Production **yanai.sh** is unchanged until **dev** → **main** merge.')"
          mapfile -t prs < <(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[].number')
          for pr in "${prs[@]}"; do
            gh pr comment "$pr" --body "$BODY"
          done

  push_git_tag:
    name: yanai-sh / deploy — version tag
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.publish.result == 'success' &&
      (needs.smoke_production.result == 'success' || needs.smoke_production.result == 'skipped')
    needs: [publish, smoke_production]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Create and push annotated tag
        env:
          TAG: ${{ needs.publish.outputs.next_tag }}
        run: |
          set -euo pipefail
          git config user.email "deploy@yanai.sh"
          git config user.name "deploy-bot"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

  github_release:
    name: yanai-sh / deploy — GitHub release
    needs: [publish, push_git_tag]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Create GitHub release (production)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ needs.publish.outputs.next_tag }}" \
            --title "${{ needs.publish.outputs.next_tag }}" \
            --generate-notes \
            --latest

  smoke_staging:
    name: yanai-sh / deploy — smoke (staging)
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: staging
    if: >-
      github.ref != 'refs/heads/main' &&
      needs.publish.outputs.staging_preview_url != '' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_smoke != 'true')
    steps:
      - uses: ./.github/actions/smoke-playwright
        with:
          smoke_base_url: ${{ needs.publish.outputs.staging_preview_url }}
          cf_access_client_id: ${{ vars.CF_ACCESS_CLIENT_ID }}
          cf_access_client_secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

  smoke_production:
    name: yanai-sh / deploy — smoke (production)
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_smoke != 'true')
    steps:
      - uses: ./.github/actions/smoke-playwright
        with:
          smoke_base_url: https://yanai.sh
