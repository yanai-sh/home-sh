# Two-stage versioned deploy:
#
#   Push to `dev` → uploads an immutable Worker version to the staging
#   Worker (yanai-sh-staging, set via `--name` override at upload time
#   against the shared apps/site/wrangler.jsonc). Production at yanai.sh
#   is unaffected. Auto-tags the commit with a patch bump (vX.Y.Z+1) so
#   dev iterations are addressable.
#
#   Push to `main` → uploads + promotes to 100% on the production Worker
#   (yanai-sh, bound to yanai.sh via Custom Domain). Auto-tags with a
#   minor bump (vX.(Y+1).0).
#
# Each Worker has its own ~10-version retention, so dev pushes never
# displace prod rollback options. Rollback (.github/workflows/rollback.yml)
# remains a separate workflow that promotes any prior immutable production
# version to 100% without rebuilding.

name: Deploy

on:
  # Staging only on `push` to `dev` (not `pull_request`): a PR preview deploy
  # plus the post-merge push would upload twice for the same merge. Every push
  # updating `refs/heads/dev` runs staging + patch tag; `main` runs prod upload
  # + promote + minor tag + release. No path filters.
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  # Auto-tagging pushes git tags back to the repository, so the workflow
  # needs write access to repo contents (default token has read-only).
  contents: write
  # Staging: comment Version Preview URL on PRs that contain this commit.
  pull-requests: write

concurrency:
  group: workers-deploy-${{ github.ref }}
  # Queue, don't cancel. Every push represents an intentional state that
  # should land as its own Worker version (rollback granularity, audit
  # trail, dashboard history). Cancelling mid-deploy wastes the upload
  # step AND hides commits from the version log.
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    outputs:
      staging_preview_url: ${{ steps.upload.outputs.preview_url }}
      next_tag: ${{ steps.tag.outputs.next }}
      previous_tag: ${{ steps.tag.outputs.previous }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history (or at least all tags) so `git tag -l` can
          # compute the previous version for the patch/minor bump.
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ secrets.RESUME_REPO_TOKEN }}

      - uses: dorny/paths-filter@v4.0.1
        id: paths
        with:
          filters: |
            workflows:
              - '.github/workflows/**'

      - uses: ./.github/actions/actionlint
        if: steps.paths.outputs.workflows == 'true'

      # Embedded into the SSR'd HTML at build time so the contact form's
      # Turnstile widget renders. Public value (widget id), not a secret.
      - uses: ./.github/actions/bun-verify
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Sync Worker runtime secrets (Secrets Store)
        # Keep runtime bindings fresh for the version being tested.
        # Reads values from GitHub Environment secrets when PUSH_SECRETS_FROM_ENV=1.
        run: bun run push-secrets
        env:
          PUSH_SECRETS_FROM_ENV: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_FROM: ${{ secrets.CONTACT_FROM }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
          RESUME_REPO_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}

      - name: Compute next version tag
        id: tag
        # Convention:
        #   - dev push → patch bump (vX.Y.Z → vX.Y.Z+1)
        #   - main push → minor bump (vX.Y.Z → vX.(Y+1).0)
        # Major bumps are intentional and remain manual.
        run: |
          set -euo pipefail
          LAST="$(git tag -l --sort=-v:refname 'v[0-9]*.[0-9]*.[0-9]*' | head -1 || true)"
          if [ -z "$LAST" ]; then LAST="v0.0.0"; fi
          VERSION="${LAST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            NEXT="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "previous=$LAST"
          echo "next=$NEXT"
          echo "previous=$LAST" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Upload Worker version
        id: upload
        # Project-pinned wrangler 4.x via the `version-upload` script in
        # apps/site/package.json. Extra args after `--` are forwarded to
        # wrangler. `--message` annotates each version with the commit
        # subject so the Cloudflare dashboard's version history is
        # human-readable. `--tag` records the new version (e.g. v2.3.1).
        # On dev pushes, `--name yanai-sh-staging` overrides the Worker
        # name so the upload lands on a separate script with its own
        # ~10-version retention. Bindings (KV, Secrets Store, D1, rate
        # limit) come from the same wrangler.jsonc and are sent verbatim
        # to whichever Worker name is the target.
        run: |
          set -euo pipefail
          NAME_FLAGS=()
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            NAME_FLAGS=(--name yanai-sh-staging)
          fi
          OUTPUT="$(bun run --cwd apps/site version-upload -- \
            "${NAME_FLAGS[@]}" \
            --message "$(git log --format='%s' -1)" \
            --tag "${{ steps.tag.outputs.next }}")"
          echo "$OUTPUT"
          # Wrangler prints "Worker Version ID: <uuid>" on success.
          VERSION_ID="$(printf '%s\n' "$OUTPUT" | grep -oE 'Worker Version ID: [a-f0-9-]+' | awk '{print $4}')"
          if [ -z "$VERSION_ID" ]; then
            echo "::error::Failed to parse Worker Version ID from wrangler output" >&2
            exit 1
          fi
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          # Immutable version preview (workers.dev). Omitted if previews are disabled for the account/subdomain.
          PREVIEW_URL="$(printf '%s\n' "$OUTPUT" | grep -oP 'Version Preview URL:\s*\Khttps://\S+' | head -1 || true)"
          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL="$(printf '%s\n' "$OUTPUT" | grep -oP 'Version Preview Alias URL:\s*\Khttps://\S+' | head -1 || true)"
          fi
          if [ -n "$PREVIEW_URL" ]; then
            echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          else
            echo "preview_url=" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Promote version to 100% production traffic
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          bun run --cwd apps/site version-deploy -- \
            "${{ steps.upload.outputs.version_id }}@100%" \
            --message "auto-promote ${GITHUB_SHA:0:7} from $(git log --format='%s' -1 | head -c 60)" \
            --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Annotate run summary
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            {
              echo "### Production deploy"
              echo ""
              echo "Tagged \`${{ steps.tag.outputs.next }}\` (previous: \`${{ steps.tag.outputs.previous }}\`)."
              echo ""
              echo "Promoted version \`${{ steps.upload.outputs.version_id }}\` to 100% at https://yanai.sh"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Staging deploy (yanai-sh-staging)"
              echo ""
              echo "Tagged \`${{ steps.tag.outputs.next }}\` (previous: \`${{ steps.tag.outputs.previous }}\`)."
              echo ""
              echo "Uploaded version \`${{ steps.upload.outputs.version_id }}\` to the **yanai-sh-staging** Worker. Production at https://yanai.sh is unchanged."
              echo ""
              if [ -n "${{ steps.upload.outputs.preview_url }}" ]; then
                echo "**Version preview URL** (automation — same as Wrangler output):"
                echo ""
                echo "${{ steps.upload.outputs.preview_url }}"
                echo ""
                echo "Use this for manual QA or \`SMOKE_BASE_URL=...\` smoke runs. Preview URLs are **public by default**; lock them with [Cloudflare Access on the Worker](https://developers.cloudflare.com/workers/configuration/previews/#manage-access-to-preview-urls) if you need auth."
              else
                echo "Wrangler did not print a **Version Preview URL** (preview URLs may be disabled for this Worker). Open **Upload Worker version** logs above, or Cloudflare → **yanai-sh-staging** → **Deployments**."
              fi
              echo ""
              echo "When ready, open a PR \`dev\` → \`main\` to promote."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment staging preview on linked PRs
        if: github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PREVIEW_URL="${{ steps.upload.outputs.preview_url }}"
          if [ -z "$PREVIEW_URL" ]; then
            echo "No preview URL parsed; skip PR comments."
            exit 0
          fi
          BODY="$(printf '%s\n' \
            '**Staging Worker preview** (**yanai-sh-staging**, immutable version):' \
            '' \
            "${PREVIEW_URL}" \
            '' \
            'Production **yanai.sh** is unchanged until **dev** → **main** merge.')"
          mapfile -t prs < <(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[].number')
          if [ "${#prs[@]}" -eq 0 ]; then
            echo "No PRs reference this commit; skip."
            exit 0
          fi
          for pr in "${prs[@]}"; do
            gh pr comment "$pr" --body "$BODY"
          done

  # Git tag + release must not run inside `environment:` jobs: GitHub can
  # supply a read-only `GITHUB_TOKEN` there, so `git push` for tags fails with
  # 403 even when workflow `permissions.contents` is write at the file level.
  push_git_tag:
    name: Push version tag
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Create and push annotated tag
        env:
          TAG: ${{ needs.publish.outputs.next_tag }}
        run: |
          set -euo pipefail
          git config user.email "deploy@yanai.sh"
          git config user.name "deploy-bot"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

  github_release:
    name: Create GitHub Release
    needs: [publish, push_git_tag]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release (production only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ needs.publish.outputs.next_tag }}" \
            --title "${{ needs.publish.outputs.next_tag }}" \
            --generate-notes \
            --latest

  smoke:
    name: Smoke (preview URL)
    needs: publish
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref != 'refs/heads/main' && needs.publish.outputs.staging_preview_url != ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-install
      - uses: ./.github/actions/playwright-chromium
      - name: Preflight (Access + origin sanity)
        env:
          SMOKE_BASE_URL: ${{ needs.publish.outputs.staging_preview_url }}
          CF_ACCESS_CLIENT_ID: ${{ vars.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          bun - <<'EOF'
          const base = process.env.SMOKE_BASE_URL;
          const id = process.env.CF_ACCESS_CLIENT_ID ?? "";
          const secret = process.env.CF_ACCESS_CLIENT_SECRET ?? "";
          if (!base) throw new Error("SMOKE_BASE_URL missing");
          const headers = (id && secret)
            ? { "CF-Access-Client-Id": id, "CF-Access-Client-Secret": secret }
            : {};
          const res = await fetch(`${base}/`, { redirect: "manual", headers });
          const ct = res.headers.get("content-type") ?? "";
          const body = await res.text();
          const title = (body.match(/<title[^>]*>([^<]*)<\/title>/i)?.[1] ?? "").trim();
          const location = res.headers.get("location") ?? "";
          const looksLikeAccess =
            /cloudflare access|access denied|cf-access|cloudflare\-access/i.test(body) ||
            /\/cdn-cgi\/access\//i.test(body) ||
            (title && /access/i.test(title)) ||
            /cloudflareaccess\.com\/cdn-cgi\/access\/login/i.test(location);
          console.log(`preflight: GET / -> ${res.status} ${ct}`);
          if (title) console.log(`preflight: title="${title}"`);
          console.log(`preflight: cf-ray=${res.headers.get("cf-ray") ?? ""}`);
          console.log(`preflight: body_prefix=${JSON.stringify(body.slice(0, 220))}`);
          if (res.status >= 300 && res.status < 400) console.log(`preflight: redirect location=${location}`);
          if (looksLikeAccess) {
            throw new Error("Preflight looks like a Cloudflare Access login/deny page. Ensure the Access policy allows this Service Token, and CF_ACCESS_CLIENT_ID/SECRET match that token.");
          }
          EOF
      - name: Smoke against staging preview URL
        env:
          SMOKE_BASE_URL: ${{ needs.publish.outputs.staging_preview_url }}
          CF_ACCESS_CLIENT_ID: ${{ vars.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: bun run smoke
