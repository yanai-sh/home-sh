# Production only: runs after merges land on `main`.
# Build → wrangler deploy of the Astro Worker. Each push uploads a fresh artifact.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workers-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
        env:
          # Embedded into the SSR'd HTML at build time so the contact form's
          # Turnstile widget renders. Public value (widget id), not a secret.
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Deploy Worker
        # Use project-pinned wrangler 4.x (devDependency in apps/site) instead of
        # cloudflare/wrangler-action which still ships wrangler 3.x. The dist
        # wrangler.json that Astro adapter v13 emits uses wrangler 4.x schema
        # (e.g. triggers: {} top-level, ai_search bindings) which 3.x rejects.
        run: bun run --cwd apps/site deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
