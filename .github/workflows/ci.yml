# Pull requests to `main` or `dev` — full verify on ubuntu-latest.
# Pushes to those branches are built and deployed in yanai-sh / Deploy.
name: yanai-sh / PR — verify

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: yanai-sh-pr-${{ github.event.pull_request.base.ref }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: yanai-sh / verify
    uses: ./.github/workflows/reusable-verify.yml
    with:
      runs-on: ubuntu-latest
    secrets: inherit
