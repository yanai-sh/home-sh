# Pull requests only — pushes to `main` are verified in the Deploy workflow.
name: yanai-sh / PR — main

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: yanai-sh-pr-main-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Required contexts for `main` ruleset — see scripts/ruleset-protect-main.json
    name: yanai-sh / verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    uses: ./.github/workflows/reusable-verify.yml
    with:
      runs-on: ${{ matrix.os }}
    secrets: inherit
