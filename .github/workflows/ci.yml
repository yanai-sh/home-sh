# Pull requests only — pushes to `main` are verified in the Deploy workflow.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel stale PR runs. Inverse of Deploy's queue policy: each PR push
  # supersedes the previous one (newer code under review = older test run is
  # already obsolete). Saves CI minutes on rapid force-pushes during a PR.
  cancel-in-progress: true

jobs:
  verify:
    # Must match branch ruleset required context exactly (see scripts/ruleset-protect-main.json).
    name: CI / verify
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          # Private `yanai-sh/resume` submodule — default `GITHUB_TOKEN` cannot clone it.
          token: ${{ secrets.RESUME_REPO_TOKEN }}

      # Pinned release (supply chain); v4+ uses Actions node24 runtime (node20 deprecated).
      - uses: dorny/paths-filter@v4.0.1
        id: paths
        with:
          filters: |
            workflows:
              - '.github/workflows/**'

      - uses: ./.github/actions/actionlint
        if: steps.paths.outputs.workflows == 'true'

      - uses: ./.github/actions/bun-verify
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
