# Pull requests only — pushes to `main` are verified in the Deploy workflow.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel stale PR runs. Inverse of Deploy's queue policy: each PR push
  # supersedes the previous one (newer code under review = older test run is
  # already obsolete). Saves CI minutes on rapid force-pushes during a PR.
  cancel-in-progress: true

jobs:
  verify:
    # Must match branch ruleset required context exactly (see scripts/ruleset-protect-main.json).
    name: CI / verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Astro 6 `astro check` uses Node; ubuntu-latest default is still 20.x.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Resolves Bun from package.json `packageManager` / `engines` (setup-bun default).
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
