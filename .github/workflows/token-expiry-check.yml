# Monthly probe of CLOUDFLARE_API_TOKEN health.
#
# Why this exists:
#   Cloudflare API tokens have configurable expiry (recommended: 1 year).
#   When they expire, the next deploy fails. Without an active probe, you only
#   learn at deploy time — bad for an on-call surface.
#
#   This workflow runs the 1st of each month (12/year), queries Cloudflare's
#   verify endpoint, and:
#     • exits 0 if the token is healthy and >30 days remain
#     • opens / updates a `token-expiry` issue when ≤30 days remain
#     • opens a `security` + `infra` issue if the token isn't active
#
#   The 30-day threshold matches the monthly cadence: any token expiring in
#   the gap between two runs gets flagged on the prior run.
#
#   Calendar-free rotation: the issue is the reminder. You see it in the
#   normal "open issues" list, rotate the token at the Cloudflare dashboard,
#   update terraform.tfvars + GH secret, close the issue.
#
# Cost: ~5 sec per run, once a month. Cloudflare API call is free.

name: Token expiry health check

on:
  schedule:
    # Monthly on the 1st at 09:00 UTC. With a 30-day warning threshold below,
    # this guarantees ≥1 alert before any expiry that would otherwise slip
    # between checks. 12 runs/year — minimum cadence that still catches a
    # 14-day window without missing it.
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cloudflare:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Drop --fail-on-error so we can read Cloudflare's structured response
          # body (which carries actionable info even on 4xx).
          response="$(curl -sS \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)"

          success="$(printf '%s' "$response" | jq -r '.success')"

          # The verify endpoint requires the token to have User → User Details → Read.
          # Without it, Cloudflare returns code 1000 "Invalid API Token" even for
          # tokens that work fine for their scoped operations (e.g. Workers Scripts:
          # Edit). Treat this distinct from "token is actually invalid" — the
          # probe needs the permission added, not a rotation.
          if [ "$success" != "true" ]; then
            error_code="$(printf '%s' "$response" | jq -r '.errors[0].code // 0')"
            error_msg="$(printf '%s'  "$response" | jq -r '.errors[0].message // "<no message>"')"
            echo "::error::Verify endpoint returned success=false code=$error_code message=$error_msg"

            existing="$(gh issue list --label token-expiry --state open --json number --jq '.[0].number // empty')"
            body="$(cat <<EOF
          The token-expiry probe got \`success=false\` from \`/user/tokens/verify\`:

          - **Code**: \`$error_code\`
          - **Message**: \`$error_msg\`

          ## Two possible causes

          1. **Missing permission** (most likely if deploys still work). The verify endpoint
             needs \`User → User Details → Read\` on the token. Add it at
             https://dash.cloudflare.com/profile/api-tokens → edit token → Permissions →
             \`User → User Details → Read\`. Save. Re-run this workflow to confirm.
          2. **Token actually invalid/revoked.** If deploys are also failing with 401, the
             token was rotated or revoked. Generate a new one and update GH secret + terraform.tfvars (+ worker-secrets.local.json if you store the token there)
             (see steps in earlier rotation comments).
          EOF
          )"
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "$body"
            else
              gh issue create \
                --title "Token expiry probe failing: $error_msg" \
                --body "$body" \
                --label "token-expiry,infra"
            fi
            exit 1
          fi

          status="$(printf '%s' "$response" | jq -r '.result.status')"
          expires_on="$(printf '%s' "$response" | jq -r '.result.expires_on // empty')"

          echo "Token status: $status"
          echo "Token expires_on: ${expires_on:-<no expiry>}"

          # --- Critical: token not active (revoked, expired, malformed) -------
          if [ "$status" != "active" ]; then
            gh issue create \
              --title "🚨 Cloudflare API token status: $status" \
              --body "$(cat <<EOF
          The token-expiry probe ran against the **production environment** \`CLOUDFLARE_API_TOKEN\` and got back \`status=$status\`.

          **Action required:** rotate immediately. Deploy will fail at the next push.

          1. Generate a new token at https://dash.cloudflare.com/profile/api-tokens
             (use the same permissions as the existing one — *Workers Scripts: Edit* on the account, plus any zone scopes you've added)
          2. Update the GitHub **Environment** secret (production) or repo secret:
             \`\`\`sh
             gh secret set CLOUDFLARE_API_TOKEN -b "<new-value>"
             \`\`\`
          3. Update **infra/tofu/terraform.tfvars** (\`cloudflare_api_token\`) for local OpenTofu.
          4. Re-run this workflow to confirm: Actions → Token expiry health check → Run workflow.
          EOF
          )" \
              --label "security,infra,token-expiry"
            exit 1
          fi

          # --- Warning: no expiry set (loose hygiene) -------------------------
          if [ -z "$expires_on" ]; then
            echo "::warning::Cloudflare token has no expiry set — recommended to set one (1 year is fine for solo use)"
            exit 0
          fi

          # --- Calculate days remaining ---------------------------------------
          days=$(( ($(date -d "$expires_on" +%s) - $(date +%s)) / 86400 ))
          echo "Days remaining: $days"

          # 30-day threshold matches the monthly cron interval — guarantees the
          # next scheduled run will see the alert before the token actually expires.
          if [ "$days" -gt 30 ]; then
            echo "Healthy. Next check 1st of next month."
            exit 0
          fi

          # --- ≤14 days: open or update tracking issue ------------------------
          existing="$(gh issue list \
            --label token-expiry \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          body="$(cat <<EOF
          Cloudflare API token expires in **${days} days** (\`${expires_on}\`).

          ## Rotate now

          1. Cloudflare Dashboard → **My Profile → API Tokens** → find the active token → **⋯ → Roll**
             (Roll keeps the same token id and permissions, generates a new value, invalidates the old immediately.)
          2. Update GH Actions secret:
             \`\`\`sh
             gh secret set CLOUDFLARE_API_TOKEN -b "<new-value>" --repo $REPO
             \`\`\`
          3. Update **infra/tofu/terraform.tfvars** (\`cloudflare_api_token\`).
          4. Re-run **Actions → Token expiry health check** to confirm clean.
          5. Close this issue once \`days remaining\` is back above 14.
          EOF
          )"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
            echo "Updated existing issue #$existing"
          else
            gh issue create \
              --title "Cloudflare token expires in $days days" \
              --body "$body" \
              --label "token-expiry,infra"
            echo "Opened new tracking issue"
          fi
