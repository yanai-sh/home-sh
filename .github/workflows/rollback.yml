# Manual rollback to a previous Worker version.
#
# Promotes an existing immutable version to 100% — no rebuild required.
# Find version_id: Cloudflare Dashboard → yanai-sh → Deployments, or
# `nub -F @yanai-sh/site exec wrangler versions list --config wrangler.jsonc`.

name: yanai-sh / Rollback

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: "Worker version id (UUID) to promote to 100%"
        required: true
        type: string
      reason:
        description: "Why are you rolling back? (logged in the version's deploy message)"
        required: false
        type: string
        default: "manual rollback"

permissions:
  contents: read

concurrency:
  group: yanai-sh-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rollback:
    name: yanai-sh / rollback — promote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/nub-install

      - name: Promote rollback version to production (100%)
        env:
          VERSION_ID: ${{ inputs.version_id }}
          ROLLBACK_REASON: ${{ inputs.reason }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          DEPLOY_OUTPUT="$(WRANGLER_CI=1 nub -F @yanai-sh/site exec wrangler versions deploy \
            --config apps/site/wrangler.jsonc \
            --version-id "${VERSION_ID}" \
            --percentage 100 \
            --message "rollback by ${GITHUB_ACTOR}: ${ROLLBACK_REASON}" \
            --yes)"
          echo "$DEPLOY_OUTPUT"
          if printf '%s\n' "$DEPLOY_OUTPUT" | grep -qF "Deployed yanai-sh version ${VERSION_ID} at 100%"; then
            echo "Promoted ${VERSION_ID} to 100%."
            exit 0
          fi
          LIST="$(WRANGLER_CI=1 nub -F @yanai-sh/site exec wrangler deployments list --config apps/site/wrangler.jsonc 2>&1 || true)"
          echo "$LIST"
          if printf '%s\n' "$LIST" | grep -qE "\(100%\)[[:space:]]${VERSION_ID}"; then
            echo "Promoted ${VERSION_ID} to 100% (confirmed via deployments list)."
            exit 0
          fi
          if ! printf '%s\n' "$DEPLOY_OUTPUT" | grep -qF "${VERSION_ID}"; then
            echo "::error::Rollback did not move 100% traffic to ${VERSION_ID}." >&2
            exit 1
          fi

      - name: Assert production serves SvelteKit splash
        env:
          CF_ACCESS_CLIENT_ID: ${{ vars.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          sleep 10
          CURL=(curl -sS --http1.1 -4)
          if [ -n "${CF_ACCESS_CLIENT_ID:-}" ] && [ -n "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
            CURL+=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          fi
          BODY="$("${CURL[@]}" https://yanai.sh/ || true)"
          if ! printf '%s' "$BODY" | grep -qE 'id="shell"|data-splash-root'; then
            echo "::error::Rollback promote succeeded but https://yanai.sh still lacks SvelteKit splash (#shell or data-splash-root)." >&2
            exit 1
          fi
          "${CURL[@]}" -o /dev/null -w "HTTP %{http_code} /resume.pdf\n" https://yanai.sh/resume.pdf
