# Called from yanai-sh / PR — verify.
name: yanai-sh / Verify (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "GitHub-hosted runner label (e.g. ubuntu-latest)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: yanai-sh / verify — run
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/actionlint

      - uses: ./.github/actions/pnpm-verify
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
