# Called from yanai-sh / PR — verify.
name: yanai-sh / Verify (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "GitHub-hosted runner label (e.g. ubuntu-latest)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: yanai-sh / verify — run
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/actionlint

      - uses: ./.github/actions/nub-verify
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
