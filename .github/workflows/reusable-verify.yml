# Called from yanai-sh / PR — main and yanai-sh / PR — dev.
name: yanai-sh / Verify (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "GitHub-hosted runner label (e.g. ubuntu-latest)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: yanai-sh / verify — run
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
          # Dependabot PRs only see Dependabot secrets (not Actions/Environment). Add `RESUME_REPO_TOKEN`
          # under Settings → Secrets and variables → Dependabot (same PAT as staging). Otherwise fall back
          # to `github.token` so checkout is valid; private `resume/` may still need the Dependabot secret.
          token: ${{ secrets.RESUME_REPO_TOKEN || github.token }}

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: paths
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            site:
              - 'apps/site/**'
            wasm:
              - 'apps/wasm/**'
            packages:
              - 'packages/**'
            infra:
              - 'infra/**'
              - 'apps/site/wrangler.jsonc'
            root_config:
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'scripts/**'

      - name: Summarize path filters
        run: |
          {
            echo "## Change detection (informational)"
            echo ""
            echo "| Area | Changed |"
            echo "|------|---------|"
            echo "| workflows / composite actions | \`${{ steps.paths.outputs.workflows }}\` |"
            echo "| apps/site | \`${{ steps.paths.outputs.site }}\` |"
            echo "| apps/wasm | \`${{ steps.paths.outputs.wasm }}\` |"
            echo "| packages | \`${{ steps.paths.outputs.packages }}\` |"
            echo "| infra / wrangler | \`${{ steps.paths.outputs.infra }}\` |"
            echo "| root lockfile / scripts | \`${{ steps.paths.outputs.root_config }}\` |"
            echo ""
            echo "Runner: **${{ inputs.runs-on }}**. Full \`pnpm run verify\` runs on every PR."
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: ./.github/actions/actionlint

      - uses: ./.github/actions/pnpm-verify
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
