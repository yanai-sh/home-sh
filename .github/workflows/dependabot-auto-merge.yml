# Enables GitHub auto-merge (squash) on Dependabot PRs so they land when CI is green,
# then deletes Dependabot's head branch. Requires Settings → General → Allow auto-merge.
name: yanai-sh / Deps — auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: yanai-sh / deps — enable auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge (squash, delete branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --delete-branch --repo "${{ github.repository }}"; then
            echo "::error::Failed to enable auto-merge. Confirm Settings → General → Allow auto-merge is on." >&2
            exit 1
          fi
