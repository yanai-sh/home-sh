# PRs into `dev` — same `pnpm run verify` as PR — main, without uploading a Worker.
# Deploy remains push-only (avoids double upload when a PR merges into `dev`).
name: yanai-sh / PR — dev

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: yanai-sh-pr-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: yanai-sh / verify — dev (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    uses: ./.github/workflows/reusable-verify.yml
    with:
      runs-on: ${{ matrix.os }}
    secrets: inherit
