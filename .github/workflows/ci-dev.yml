# PRs into `dev` — same `bun run verify` as CI for `main`, without uploading a Worker.
# Deploy remains push-only (avoids double upload when a PR merges into `dev`).
name: CI (dev)

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: ci-dev-${{ github.workflow }}-${{ github.event.pull_request.number }}
  # Cancel stale runs when new commits are pushed to the same PR.
  cancel-in-progress: true

jobs:
  verify:
    name: CI (dev) / verify
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: paths
        with:
          filters: |
            workflows:
              - '.github/workflows/**'

      - uses: ./.github/actions/actionlint
        if: steps.paths.outputs.workflows == 'true'

      - uses: ./.github/actions/bun-verify
        with:
          public_turnstile_site_key: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
