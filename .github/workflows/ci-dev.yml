# PRs into `dev` — same `bun run verify` as CI for `main`, without uploading a Worker.
# Deploy remains push-only (avoids double upload when a PR merges into `dev`).
name: CI (dev)

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: ci-dev-${{ github.workflow }}-${{ github.event.pull_request.number }}
  # Cancel stale runs when new commits are pushed to the same PR.
  cancel-in-progress: true

jobs:
  verify:
    name: CI (dev) / verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
        env:
          # Same as Deploy — embedded at build time for the Turnstile widget.
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
