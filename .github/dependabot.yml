# Native GitHub dependency PRs (no Renovate / third-party app).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      runtime-ui:
        patterns:
          - "hono"
          - "@cloudflare/*"
          - "velite"
          - "@fontsource/*"
          - "tailwindcss"
          - "@tailwindcss/*"
      tool-types-lint:
        patterns:
          - "wrangler"
          - "vite-plus"
          - "vitest"
          - "@types/*"
          - "typescript"
      root-scripts:
        patterns:
          - "lefthook"
          - "playwright"
          - "tsx"
    labels:
      - dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
