name: yanai-sh / setup — playwright-chromium
description: Install Playwright Chromium browser + OS deps (requires nub on PATH, e.g. after nub-install)
runs:
  using: composite
  steps:
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-ms-playwright-${{ hashFiles('lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-ms-playwright-
    - name: Install Playwright Chromium
      run: nub exec playwright install --with-deps chromium
      shell: bash
