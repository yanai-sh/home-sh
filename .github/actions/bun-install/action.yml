name: yanai-sh / setup — bun-install
description: Node 22, Bun from packageManager, frozen lockfile install
runs:
  using: composite
  steps:
    - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
      with:
        node-version: "22"
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock', 'package.json', 'apps/site/package.json', 'packages/ui-system/package.json') }}
        restore-keys: |
          ${{ runner.os }}-bun-install-
    - name: Install dependencies (Bun)
      run: bun install --frozen-lockfile
      shell: bash
