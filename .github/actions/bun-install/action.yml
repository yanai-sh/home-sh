name: Bun install
description: Node 22, Bun from packageManager, frozen lockfile install
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: "22"
    - uses: oven-sh/setup-bun@v2
    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
