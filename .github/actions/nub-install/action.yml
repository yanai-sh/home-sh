name: yanai-sh / setup — nub-install
description: Node 22, Nub from packageManager, frozen lockfile install
runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".node-version"
    - name: Install Nub
      run: curl -fsSL https://nubjs.com/install.sh | bash
      shell: bash
    - name: Add Nub to PATH
      run: echo "$HOME/.nub/bin" >> "$GITHUB_PATH"
      shell: bash
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.local/share/nub/store/v1
        key: ${{ runner.os }}-nub-store-${{ hashFiles('lock.yaml', 'package.json', 'apps/site/package.json') }}
        restore-keys: |
          ${{ runner.os }}-nub-store-
    - name: Install dependencies (nub)
      run: nub ci
      shell: bash
