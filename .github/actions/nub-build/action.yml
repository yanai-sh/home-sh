name: yanai-sh / setup — nub-build
description: nub ci then build (Deploy path — no duplicate check/test)
inputs:
  public_turnstile_site_key:
    description: Public Turnstile site key for build-time embed (same as Deploy)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: ./.github/actions/nub-install
    - name: Build site (Worker bundle in .svelte-kit/cloudflare/)
      run: nub run build
      shell: bash
      env:
        NODE_COMPAT: "1"
        PUBLIC_TURNSTILE_SITE_KEY: ${{ inputs.public_turnstile_site_key }}
