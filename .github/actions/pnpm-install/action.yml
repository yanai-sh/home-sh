name: yanai-sh / setup — pnpm-install
description: Node 22, pnpm from packageManager, frozen lockfile install
runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".node-version"
    - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'apps/site/package.json') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - name: Install dependencies (pnpm)
      run: pnpm install --frozen-lockfile
      shell: bash
