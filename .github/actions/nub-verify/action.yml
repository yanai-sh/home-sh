name: yanai-sh / setup — nub-verify
description: nub ci then nub run verify (expects repo checkout before this action)
inputs:
  public_turnstile_site_key:
    description: Public Turnstile site key for build-time embed (same as Deploy)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: ./.github/actions/nub-install
    - name: Run monorepo verify
      run: nub run verify
      shell: bash
      env:
        NODE_COMPAT: "1"
        PUBLIC_TURNSTILE_SITE_KEY: ${{ inputs.public_turnstile_site_key }}
