# https://lefthook.dev

pre-commit:
  commands:
    no-work-identity:
      run: |
        email="$(git config user.email)"
        case "$email" in
          *@kardome.com|*kardome*|*klugman.yanai*)
            echo "lefthook: refusing to commit — configured user.email is '$email'." >&2
            echo "lefthook: this repo is personal; expected me@yanai.sh." >&2
            exit 1
            ;;
        esac

pre-push:
  commands:
    verify:
      run: pnpm run verify
