# https://lefthook.dev

output:
  - meta
  - execution
  - summary

pre-commit:
  commands:
    no-work-identity:
      run: sh scripts/no-work-identity.sh

pre-push:
  commands:
    verify:
      # WSL proxy + step banners (see scripts/verify-with-progress.sh). Avoid
      # `nub run verify` here: Windows script runners can exit non-zero with
      # no output when run non-interactively (as lefthook does).
      # interactive: stream stdout/stderr live instead of buffering until the end.
      run: node scripts/wsl-proxy.mjs sh scripts/verify-with-progress.sh
      interactive: true
