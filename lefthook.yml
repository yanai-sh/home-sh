# https://lefthook.dev

pre-commit:
  commands:
    no-work-identity:
      run: sh scripts/no-work-identity.sh

pre-push:
  commands:
    verify:
      # Call the WSL proxy directly rather than `pnpm run verify`: Windows pnpm's
      # script-runner exits non-zero with no output when run non-interactively
      # (as lefthook does). The proxy runs locally on non-Windows.
      run: node scripts/wsl-proxy.mjs pnpm --filter @yanai-sh/site verify
